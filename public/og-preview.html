<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #FAFAF7;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: #FAFAF7;
      position: relative;
      padding: 72px 80px 0;
      display: flex;
      flex-direction: column;
    }
    .logo-wrap { margin-bottom: 32px; }
    .tagline {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 82px;
      line-height: 1.05;
      letter-spacing: -2px;
      color: #1B4332;
    }
    .tagline .orange { color: #E8571A; }
    .sub {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 26px;
      color: #5C5C58;
      letter-spacing: 0.2px;
      margin-top: 20px;
    }
    .bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 10px;
      background: #E8571A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <!-- SVG exacto de Variante A — fondo claro (brand file) -->
      <svg viewBox="0 0 200 88" xmlns="http://www.w3.org/2000/svg" width="360" height="158">
        <path d="M14,4 H172 Q186,4 186,18 V54 Q186,68 172,68 H48 Q44,68 42,72 L30,84 Q28,86 26,84 L20,76 Q18,72 14,72 H14 Q0,72 0,58 V18 Q0,4 14,4 Z" fill="#1B4332"/>
        <text x="93" y="44" text-anchor="middle" font-family="'Nunito',sans-serif" font-weight="800" font-size="32" fill="#FAFAF7" letter-spacing="-1">Atendo</text>
        <circle cx="174" cy="51" r="8" fill="#E8571A"/>
      </svg>
    </div>
    <div class="tagline">
      Ningún cliente<br><span class="orange">sin respuesta.</span>
    </div>
    <div class="sub">Agente IA para WhatsApp · Chile</div>
    <div class="bar"></div>
  </div>
</body>
</html>
